<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="spider d-flex flex-column align-items-center justify-content-center">
        <div class="shadow-box">
            <div class="Date d-flex justify-content-center gap-4 align-items-center">
                <span id="day">Day</span>
                <span id="date">Date</span>
                <span id="month">Month</span>
                <span id="year">Year</span>
            </div>

            <div class="clock d-flex justify-content-center gap-4 align-items-center">
                <span id="hours">HOURS</span>
                <span>:</span>
                <span id="mins">MINS</span>
                <span>:</span>
                <span id="secs">SECS</span>
                <span id="ampm">AM/PM</span>
            </div>
        </div>

        <ul class="nav nav-pills nav-fill gap-2 p-1 small  rounded-5 shadow-sm" id="pillNav2" role="tablist"
            style="--bs-nav-link-color: var(--bs-white); --bs-nav-pills-link-active-color: var(--bs-danger); --bs-nav-pills-link-active-bg: var(--bs-white);">

            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-5" id="spider-Theme-tab" data-bs-toggle="tab" type="button"
                    role="tab" aria-selected="true">RED</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-5" id="Miles-Theme-tab" data-bs-toggle="tab" type="button" role="tab"
                    aria-selected="false">Dark</button>
            </li>
        </ul>



    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./main.js"></script>

</body>

</html>
