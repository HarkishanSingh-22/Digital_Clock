<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="styleshgiyeet" href="./style.css">
</head>

<body>

    <div class="spider d-flex flex-column align-items-center justify-content-center">
        <div class="shadow-box">
            <div class="Date d-flex justify-content-center gap-4 align-items-center">
                <span id="day">Day</span>
                <span id="date">Date</span>
                <span id="month">Month</span>
                <span id="year">Year</span>
            </div>

            <div class="clock d-flex justify-content-center gap-4 align-items-center">
                <span id="hours">HOURS</span>
                <span>:</span>
                <span id="mins">MINS</span>
                <span>:</span>
                <span id="secs">SECS</span>
                <span id="ampm">AM/PM</span>
            </div>
        </div>


    </div>
    <script src="./main.js"></script>

</body>

</html>
